services:
  # ---------------------------------------------------------------------------
  # Postgres (warehouse + metadata)
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./infra/postgres
    env_file:
      - .env
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - space_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-space_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Simple utility container for network / DB tests
  tools:
    image: alpine:3.19
    command: ["sh", "-c", "sleep 3600"]
    networks:
      - space_net
    depends_on:
      - postgres

  # ---------------------------------------------------------------------------
  # Kafka + Zookeeper
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - space_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    env_file:
      - ./infra/kafka/docker-compose.env
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
    networks:
      - space_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Kafka CLI tools for topic/message testing
  kafka-tools:
    image: confluentinc/cp-kafka:7.6.0
    command: ["sleep", "3600"]
    networks:
      - space_net
    depends_on:
      - kafka

  # ---------------------------------------------------------------------------
  # Spark (master + worker)
  # ---------------------------------------------------------------------------
  spark-master:
    build:
      context: ./infra/spark
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master"]
    ports:
      - "7077:7077"   # Spark master
      - "8081:8080"   # Spark master web UI
    volumes:
      - ./spark_jobs:/opt/spark/jobs
      - ./spark_jobs/checkpoints:/opt/spark/checkpoints
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-worker:
    build:
      context: ./infra/spark
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    volumes:
      - ./spark_jobs:/opt/spark/jobs
    networks:
      - space_net
    depends_on:
      - spark-master

  # ---------------------------------------------------------------------------
  # Airflow (webserver + scheduler, LocalExecutor)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build:
      context: ./infra/airflow
    env_file:
      - .env
      - ./infra/airflow/airflow.env
    command: ["webserver"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./services:/opt/airflow/services
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./dbt:/dbt
    environment:
      PYTHONPATH: /opt/airflow
    networks:
      - space_net

  airflow-scheduler:
    build:
      context: ./infra/airflow
    env_file:
      - .env
      - ./infra/airflow/airflow.env
    command: ["scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./services:/opt/airflow/services
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./dbt:/dbt
    environment:
      PYTHONPATH: /opt/airflow
    networks:
      - space_net

  # ---------------------------------------------------------------------------
  # dbt (Postgres target)
  # ---------------------------------------------------------------------------
  dbt:
    build:
      context: ./infra/dbt
    env_file:
      - .env
    environment:
      - DBT_PROFILES_DIR=/dbt
    working_dir: /dbt/space_objects
    volumes:
      - ./dbt:/dbt
    networks:
      - space_net
    depends_on:
      - postgres

  # ---------------------------------------------------------------------------
  # Monitoring: Prometheus + Grafana (skeleton)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - space_net

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    networks:
      - space_net
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://space_user:space_password@postgres:5432/space_warehouse?sslmode=disable"
    networks:
      - space_net
    depends_on:
      - postgres

  
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command:
      - "--kafka.server=kafka:9092"
    networks:
      - space_net
    depends_on:
      - kafka


  node-exporter:
    image: prom/node-exporter:v1.8.1
    ports:
      - "9100:9100"
    networks:
      - space_net

  ingestion:
    build:
      context: .
      dockerfile: ./infra/ingestion/Dockerfile
    image: space-objects-ingestion
    networks:
      - space_net
    env_file:
      - .env
    depends_on:
      - postgres

  nasa-neo-batch:
    image: space-objects-ingestion
    command: ["python", "-m", "services.ingestion.nasa_neo.neo_batch_ingestor"]
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      - postgres

  
  celestrak-batch:
    image: space-objects-ingestion
    command: ["python", "-m", "services.ingestion.celestrak.celestrak_batch_ingestor"]
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      - postgres


  nasa-neo-stream:
    image: space-objects-ingestion
    command: ["python", "-m", "services.ingestion.nasa_neo.neo_stream_producer"]
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  celestrak-stream:
    image: space-objects-ingestion
    command: ["python", "-m", "services.ingestion.celestrak.celestrak_stream_producer"]
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Synthetic data services (use SYNTHETIC_ENABLED=true to activate)
  # ---------------------------------------------------------------------------

  # One-shot seeder: seeds bronze tables and exits.
  # Run with: docker compose run --rm synthetic-seeder --neo 500 --satcat 1000
  synthetic-seeder:
    image: space-objects-ingestion
    command: ["python", "-m", "services.synthetic.batch_seeder", "--neo", "200", "--satcat", "300"]
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - synthetic

  # Continuous synthetic Kafka producer for streaming load tests.
  # Run with: docker compose --profile synthetic up synthetic-stream
  synthetic-stream:
    image: space-objects-ingestion
    command: ["python", "-m", "services.synthetic.stream_producer", "--neo-rate", "3", "--satcat-rate", "5", "--interval", "5"]
    env_file:
      - .env
    networks:
      - space_net
    depends_on:
      kafka:
        condition: service_healthy
    profiles:
      - synthetic


# ---------------------------------------------------------------------------
# Networks & Volumes
# ---------------------------------------------------------------------------
networks:
  space_net:

volumes:
  postgres_data:
